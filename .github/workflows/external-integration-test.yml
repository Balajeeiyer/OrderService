name: External Integration Test

on:
  repository_dispatch:
    types: [external-integration-test]
  workflow_dispatch:
    inputs:
      mockai_pr_number:
        description: 'MockAI PR number'
        required: false
      test_type:
        description: 'Test type (all, integration, performance)'
        required: false
        default: 'all'

jobs:
  integration-test:
    name: Run Integration Tests Against MockAI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout OrderService
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Extract MockAI PR details
        id: mockai-info
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "pr_number=${{ github.event.client_payload.source_pr }}" >> $GITHUB_OUTPUT
            echo "pr_sha=${{ github.event.client_payload.source_sha }}" >> $GITHUB_OUTPUT
            echo "pr_branch=${{ github.event.client_payload.source_branch }}" >> $GITHUB_OUTPUT
            echo "source_repo=${{ github.event.client_payload.source_repo }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.inputs.mockai_pr_number }}" >> $GITHUB_OUTPUT
            echo "pr_sha=main" >> $GITHUB_OUTPUT
            echo "pr_branch=main" >> $GITHUB_OUTPUT
            echo "source_repo=Balajeeiyer/MockAI" >> $GITHUB_OUTPUT
          fi

      - name: Clone MockAI repository
        run: |
          echo "Cloning MockAI from ${{ steps.mockai-info.outputs.source_repo }}"
          git clone https://github.com/${{ steps.mockai-info.outputs.source_repo }}.git mockai
          cd mockai

          if [ "${{ steps.mockai-info.outputs.pr_branch }}" != "main" ]; then
            echo "Checking out PR branch: ${{ steps.mockai-info.outputs.pr_branch }}"
            git fetch origin ${{ steps.mockai-info.outputs.pr_branch }}
            git checkout ${{ steps.mockai-info.outputs.pr_branch }}
          fi

          echo "Current commit: $(git rev-parse HEAD)"

      - name: Install dependencies
        run: |
          npm ci
          cd mockai && npm ci

      - name: Start Docker Compose test environment
        run: |
          docker compose -f docker-compose.test.yml up -d mockai orderservice

          echo "Waiting for services to be healthy..."
          timeout 120 bash -c 'until docker compose -f docker-compose.test.yml ps | grep -q "healthy"; do sleep 5; done'

          docker compose -f docker-compose.test.yml ps

      - name: Run Schema Validation
        id: schema-validation
        run: |
          echo "Running schema validation..."
          docker compose -f docker-compose.test.yml run --rm integration-tests npm run test:schema
        continue-on-error: true

      - name: Run Integration Tests
        id: integration-tests
        if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'integration' || github.event_name == 'repository_dispatch'
        run: |
          echo "Running integration tests..."
          docker compose -f docker-compose.test.yml run --rm integration-tests npm run test:integration
        continue-on-error: true

      - name: Run Performance Benchmarks
        id: performance-tests
        if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'performance' || github.event_name == 'repository_dispatch'
        run: |
          echo "Running performance benchmarks..."
          docker compose -f docker-compose.test.yml run --rm performance-tests
        continue-on-error: true

      - name: Collect test results
        if: always()
        run: |
          docker compose -f docker-compose.test.yml logs > docker-logs.txt

          # Create test results summary
          cat > test-results-summary.md <<EOF
          # Integration Test Results

          **MockAI PR**: ${{ steps.mockai-info.outputs.source_repo }}#${{ steps.mockai-info.outputs.pr_number }}
          **SHA**: ${{ steps.mockai-info.outputs.pr_sha }}
          **Branch**: ${{ steps.mockai-info.outputs.pr_branch }}
          **Triggered**: ${{ github.event_name }}
          **Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Test Results

          - **Schema Validation**: ${{ steps.schema-validation.outcome }}
          - **Integration Tests**: ${{ steps.integration-tests.outcome }}
          - **Performance Benchmarks**: ${{ steps.performance-tests.outcome }}

          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results-summary.md
            docker-logs.txt
            test/results/

      - name: Report results to MockAI PR
        if: github.event_name == 'repository_dispatch' && steps.mockai-info.outputs.pr_number != ''
        uses: actions/github-script@v7
        env:
          MOCKAI_REPO: ${{ steps.mockai-info.outputs.source_repo }}
          MOCKAI_PR: ${{ steps.mockai-info.outputs.pr_number }}
          SCHEMA_RESULT: ${{ steps.schema-validation.outcome }}
          INTEGRATION_RESULT: ${{ steps.integration-tests.outcome }}
          PERFORMANCE_RESULT: ${{ steps.performance-tests.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.MOCKAI_REPO.split('/');
            const prNumber = parseInt(process.env.MOCKAI_PR);

            const schemaIcon = process.env.SCHEMA_RESULT === 'success' ? '✅' : '❌';
            const integrationIcon = process.env.INTEGRATION_RESULT === 'success' ? '✅' : '❌';
            const performanceIcon = process.env.PERFORMANCE_RESULT === 'success' ? '✅' : '❌';

            const overallStatus = (
              process.env.SCHEMA_RESULT === 'success' &&
              process.env.INTEGRATION_RESULT === 'success' &&
              process.env.PERFORMANCE_RESULT === 'success'
            ) ? '✅ All Tests Passed' : '❌ Some Tests Failed';

            const comment = `## 🔗 OrderService Integration Test Results

            ${overallStatus}

            | Test Suite | Result |
            |------------|--------|
            | Schema Validation | ${schemaIcon} ${process.env.SCHEMA_RESULT} |
            | Integration Tests | ${integrationIcon} ${process.env.INTEGRATION_RESULT} |
            | Performance Benchmarks | ${performanceIcon} ${process.env.PERFORMANCE_RESULT} |

            **Repository**: OrderService
            **Workflow Run**: [View Details](${context.payload.repository.html_url}/actions/runs/${context.runId})

            ---
            *Automated integration testing triggered by MockAI PR changes*`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: comment
            });

      - name: Create GitHub Check
        if: github.event_name == 'repository_dispatch' && steps.mockai-info.outputs.pr_number != ''
        uses: actions/github-script@v7
        env:
          MOCKAI_REPO: ${{ steps.mockai-info.outputs.source_repo }}
          MOCKAI_SHA: ${{ steps.mockai-info.outputs.pr_sha }}
          SCHEMA_RESULT: ${{ steps.schema-validation.outcome }}
          INTEGRATION_RESULT: ${{ steps.integration-tests.outcome }}
          PERFORMANCE_RESULT: ${{ steps.performance-tests.outcome }}
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN }}
          script: |
            const [owner, repo] = process.env.MOCKAI_REPO.split('/');

            const conclusion = (
              process.env.SCHEMA_RESULT === 'success' &&
              process.env.INTEGRATION_RESULT === 'success' &&
              process.env.PERFORMANCE_RESULT === 'success'
            ) ? 'success' : 'failure';

            await github.rest.checks.create({
              owner,
              repo,
              name: 'OrderService Integration Tests',
              head_sha: process.env.MOCKAI_SHA,
              status: 'completed',
              conclusion,
              details_url: `${context.payload.repository.html_url}/actions/runs/${context.runId}`,
              output: {
                title: conclusion === 'success' ? 'All tests passed' : 'Some tests failed',
                summary: `Schema: ${process.env.SCHEMA_RESULT}, Integration: ${process.env.INTEGRATION_RESULT}, Performance: ${process.env.PERFORMANCE_RESULT}`
              }
            });

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v
          docker system prune -f

      - name: Set exit code
        if: always()
        run: |
          if [ "${{ steps.schema-validation.outcome }}" != "success" ] || \
             [ "${{ steps.integration-tests.outcome }}" != "success" ] || \
             [ "${{ steps.performance-tests.outcome }}" != "success" ]; then
            echo "❌ Some tests failed"
            exit 1
          else
            echo "✅ All tests passed"
            exit 0
          fi
